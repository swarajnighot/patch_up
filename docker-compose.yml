services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    # Service name must stay `backend` — frontend/nginx.conf upstream uses backend:3000
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      # Overrides .env for in-network Mongo service name
      MONGO_HOST: mongo
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      # Host :80 → nginx in container (so http://localhost works)
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
