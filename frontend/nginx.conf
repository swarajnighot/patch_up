# Served as /etc/nginx/conf.d/default.conf in the nginx image.
# Frontend calls same-origin paths like fetch("/api/...") — no hardcoded host in JS.
# Requests under /api/ are proxied to the backend (Docker service name + port).

upstream backend_api {
    # Compose/Kubernetes service hostname; adjust port to match your backend listen port.
    server backend:3000;
    keepalive 8;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    location /api/ {
        # No URI on proxy_pass — forward full path (e.g. /api/v1/health-check)
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
